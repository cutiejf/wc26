<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Page Manager - Standalone</title>
  <style>
    :root { --pw: 4.25in; --ph: 5.5in; --scale: 0.18; }
    body { font-family: system-ui, Segoe UI, Arial, sans-serif; margin: 0; background: #2a2a2e; color: #eee; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #1a1a1d; border-bottom: 1px solid #3a3a3f; }
    header strong { color: #fff; }
    .controls { display: flex; gap: 8px; }
    button { padding: 7px 12px; border: 1px solid #555; background: #2e2e33; color: #eee; border-radius: 5px; cursor: pointer; font-size: 13px; }
    button:hover { background: #3e3e46; }
    main { padding: 16px; }
    .hint { color: #888; font-size: 13px; }

    /* Each card = one sheet (spread) */
    .grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 14px; }

    /* Card dimensions based on 2-page spread at --scale */
    /* 4.25in * 2 = 8.5in wide, 5.5in tall → at 96dpi: 816 × 528px → scaled */
    .card {
      background: #1a1a1d;
      border: 1px solid #3a3a3f;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #666; }
    .card-spread {
      display: flex;
      background: #111;
      position: relative;
    }
    .card-spread .face-wrap {
      width: calc(4.25in * var(--scale));
      height: calc(5.5in * var(--scale));
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    .card-spread .face-wrap:first-child {
      border-right: 1px solid #333;
    }
    .card-spread iframe {
      border: 0;
      width: calc(4.25in);
      height: calc(5.5in);
      transform-origin: top left;
      transform: scale(var(--scale));
      pointer-events: none;
      display: block;
    }
    .card-meta {
      padding: 6px 10px;
      font-size: 11px;
      color: #888;
      background: #1a1a1d;
      display: flex;
      justify-content: space-between;
    }
    .card-meta .pg { color: #ccc; font-weight: 600; }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .modal-inner { background: #1e1e22; width: 96vw; max-width: 1100px; max-height: 92vh; overflow: auto; border-radius: 10px; padding: 16px; border: 1px solid #444; }
    .modal-toolbar { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 14px; align-items: center; }
    .modal-toolbar h3 { margin: 0; color: #ddd; font-size: 14px; }
    .modal-spread { display: flex; gap: 12px; margin-bottom: 14px; justify-content: center; }
    .modal-spread iframe { border: 1px solid #444; border-radius: 3px; display: block; width: 4.25in; height: 5.5in; }
    .modal-label { font-size: 11px; color: #888; text-align: center; margin-top: 4px; }
    .modal-code { display: flex; gap: 12px; }
    .modal-code > div { flex: 1; }
    .modal-code label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
    .modal-code textarea { width: 100%; height: 140px; background: #111; color: #ccc; border: 1px solid #444; border-radius: 4px; font-size: 11px; font-family: monospace; padding: 6px; box-sizing: border-box; resize: vertical; }
  </style>
</head>
<body>
  <header>
    <div><strong>Page Manager (Standalone)</strong></div>
    <div class="controls">
      <button id="import-btn">Import from flipbook-test.html</button>
      <button id="add-blank-btn">Add Blank</button>
      <button id="download-all-btn">Export All as PDFs</button>
    </div>
  </header>

  <main>
    <div id="status" class="hint">Import pages from the site to view and export.</div>
    <div id="grid" class="grid" style="margin-top:12px"></div>
  </main>

  <div id="modal" class="modal">
    <div class="modal-inner">
      <div class="modal-toolbar">
        <h3 id="modal-title">Sheet</h3>
        <div style="display:flex;gap:8px">
          <button id="export-pdf">Export PDF</button>
          <button id="replace-html">Save HTML</button>
          <button id="modal-close">✕ Close</button>
        </div>
      </div>
      <div class="modal-spread">
        <div>
          <iframe id="modal-iframe-front"></iframe>
          <div class="modal-label" id="modal-label-front">Front</div>
        </div>
        <div>
          <iframe id="modal-iframe-back"></iframe>
          <div class="modal-label" id="modal-label-back">Back</div>
        </div>
      </div>
      <div class="modal-code">
        <div><label>Front HTML</label><textarea id="modal-front"></textarea></div>
        <div><label>Back HTML</label><textarea id="modal-back"></textarea></div>
      </div>
    </div>
  </div>

  <script>
    const SOURCE_FILE = '../flipbook-test.html';
    const ASSETS = [
      '../book-example.css',
      '../flipbook.css',
      '../book-groups.js'
    ];

    const grid = document.getElementById('grid');
    const status = document.getElementById('status');
    let pages = [];
    let cachedAssetHTML = '';
    let selectedIndex = -1;

    // Build <link>/<script> tags to inject into preview/export iframes
    async function buildAssetHead() {
      if (cachedAssetHTML) return cachedAssetHTML;
      const tags = ASSETS.map(a => {
        if (a.endsWith('.css')) return `<link rel="stylesheet" href="${location.origin}${a.startsWith('..') ? '/'+a.replace('../','') : a}">`;
        return `<script src="${location.origin}${a.startsWith('..') ? '/'+a.replace('../','') : a}"><\/script>`;
      });
      cachedAssetHTML = tags.join('\n');
      return cachedAssetHTML;
    }

    function pageHTML(inner) {
      return `<!doctype html><html><head><meta charset="utf-8">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#fff}
  .front,.back{width:4.25in;height:5.5in;overflow:hidden;position:relative}
</style>
${cachedAssetHTML}
</head><body>${inner}</body></html>`;
    }

    function writeFrame(iframe, innerHTML) {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(pageHTML(innerHTML));
      doc.close();
    }

    function renderGrid() {
      grid.innerHTML = '';
      pages.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'card';

        const spread = document.createElement('div');
        spread.className = 'card-spread';

        const frontWrap = document.createElement('div'); frontWrap.className = 'face-wrap';
        const fi = document.createElement('iframe');
        frontWrap.appendChild(fi);

        const backWrap = document.createElement('div'); backWrap.className = 'face-wrap';
        const bi = document.createElement('iframe');
        backWrap.appendChild(bi);

        spread.appendChild(frontWrap);
        spread.appendChild(backWrap);

        const meta = document.createElement('div');
        meta.className = 'card-meta';
        const ll = p.pgFront ? `p${p.pgFront}` : 'front';
        const rl = p.pgBack  ? `p${p.pgBack}`  : 'back';
        meta.innerHTML = `<span class="pg">${ll} &nbsp;/&nbsp; ${rl}</span><span>${p.id || ''}</span>`;

        card.appendChild(spread);
        card.appendChild(meta);
        card.addEventListener('click', () => openModal(idx));
        grid.appendChild(card);

        writeFrame(fi, `<div class="front">${p.frontHTML || ''}</div>`);
        writeFrame(bi, `<div class="back">${p.backHTML  || ''}</div>`);
      });
    }

    async function importFromSource() {
      status.textContent = `Importing ${SOURCE_FILE}…`;
      try {
        await buildAssetHead();
        const resp = await fetch(SOURCE_FILE);
        if (!resp.ok) throw new Error('Fetch failed: ' + resp.status);
        const txt = await resp.text();
        const doc = new DOMParser().parseFromString(txt, 'text/html');
        const nodeList = doc.querySelectorAll('.page');
        pages = [];
        nodeList.forEach((n, i) => {
          const front = n.querySelector('.front');
          const back  = n.querySelector('.back');
          const fNum  = front?.querySelector('.pg-num')?.textContent?.trim();
          const bNum  = back?.querySelector('.pg-num')?.textContent?.trim();
          pages.push({
            id: n.id || ('page-' + i),
            pgFront: fNum, pgBack: bNum,
            frontHTML: front ? front.innerHTML : '',
            backHTML:  back  ? back.innerHTML  : ''
          });
        });
        renderGrid();
        status.textContent = `Imported ${pages.length} sheets from flipbook-test.html`;
      } catch(err) {
        status.textContent = 'Import failed: ' + err.message + ' — serve via local server (e.g. npx serve d:/cleann)';
      }
    }

    function addBlank() {
      pages.push({ id: 'blank-' + Date.now(), frontHTML: '', backHTML: '' });
      renderGrid();
    }

    // ── Modal ──────────────────────────────────────────────
    const modal            = document.getElementById('modal');
    const modalClose       = document.getElementById('modal-close');
    const modalTitle       = document.getElementById('modal-title');
    const modalIframeFront = document.getElementById('modal-iframe-front');
    const modalIframeBack  = document.getElementById('modal-iframe-back');
    const modalLabelFront  = document.getElementById('modal-label-front');
    const modalLabelBack   = document.getElementById('modal-label-back');
    const modalFront       = document.getElementById('modal-front');
    const modalBack        = document.getElementById('modal-back');
    const exportPdfBtn     = document.getElementById('export-pdf');
    const replaceBtn       = document.getElementById('replace-html');

    function openModal(idx) {
      selectedIndex = idx;
      const p = pages[idx];
      const ll = p.pgFront ? `p${p.pgFront}` : 'front';
      const rl = p.pgBack  ? `p${p.pgBack}`  : 'back';
      modalTitle.textContent = `Sheet ${idx} — ${p.id || ''}`;
      modalLabelFront.textContent = ll;
      modalLabelBack.textContent  = rl;
      writeFrame(modalIframeFront, `<div class="front">${p.frontHTML || ''}</div>`);
      writeFrame(modalIframeBack,  `<div class="back">${p.backHTML  || ''}</div>`);
      modalFront.value = p.frontHTML || '';
      modalBack.value  = p.backHTML  || '';
      modal.style.display = 'flex';
    }
    modalClose.addEventListener('click', () => { modal.style.display = 'none'; });
    replaceBtn.addEventListener('click', () => {
      if (selectedIndex < 0) return;
      pages[selectedIndex].frontHTML = modalFront.value;
      pages[selectedIndex].backHTML  = modalBack.value;
      renderGrid();
      alert('Saved (in-memory). Re-import will overwrite.');
    });

    exportPdfBtn.addEventListener('click', () => {
      if (selectedIndex < 0) return;
      exportPageToPDF(pages[selectedIndex], `page-${selectedIndex}`);
    });

    function exportPageToPDF(pageObj, name) {
      const w = window.open('', '_blank');
      if (!w) { alert('Popup blocked — allow popups for this page.'); return; }
      const html = pageHTML(`
<style>
  @page { size: 4.25in 5.5in; margin: 0; }
  @media print { body { margin: 0; } }
</style>
<div class="front">${pageObj.frontHTML || ''}</div>
<script>window.onload = () => setTimeout(() => window.print(), 400);<\/script>`);
      w.document.open(); w.document.write(html); w.document.close();
    }

    document.getElementById('import-btn').addEventListener('click', importFromSource);
    document.getElementById('add-blank-btn').addEventListener('click', addBlank);
    document.getElementById('download-all-btn').addEventListener('click', () => {
      if (!pages.length) { alert('Import pages first.'); return; }
      pages.forEach((p, i) => exportPageToPDF(p, `page-${i}`));
    });
  </script>
</body>
</html>
